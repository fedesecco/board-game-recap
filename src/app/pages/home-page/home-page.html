<main class="home-page">
  <section class="search-shell">
    <label class="search-bar" aria-label="Cerca giochi">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M10.5 4a6.5 6.5 0 1 0 4.027 11.603l4.435 4.435 1.414-1.414-4.435-4.435A6.5 6.5 0 0 0 10.5 4Zm0 2a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9Z"
        />
      </svg>
      <input
        type="search"
        [value]="query()"
        (input)="updateQuery($event)"
        placeholder="Cerca un gioco"
      />
    </label>

    <button
      class="filters-toggle"
      type="button"
      [attr.aria-expanded]="filtersOpen()"
      aria-controls="catalog-filters"
      (click)="toggleFilters()"
    >
      <span>Filtri</span>
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M3.75 6.75A.75.75 0 0 1 4.5 6h15a.75.75 0 0 1 0 1.5h-15a.75.75 0 0 1-.75-.75Zm3 5.25a.75.75 0 0 1 .75-.75h9a.75.75 0 0 1 0 1.5h-9a.75.75 0 0 1-.75-.75Zm3 5.25a.75.75 0 0 1 .75-.75h3a.75.75 0 0 1 0 1.5h-3a.75.75 0 0 1-.75-.75Z"
        />
      </svg>
    </button>

    <div
      id="catalog-filters"
      class="filters-row"
      [class.filters-row--open]="filtersOpen()"
      aria-label="Filtri catalogo"
    >
      <label class="filter-field">
        <span>Giocatori</span>
        <select [value]="playersFilter()" (change)="updatePlayersFilter($event)">
          <option value="">Tutti</option>
          <option value="1">1+</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7+</option>
        </select>
      </label>

      <label class="filter-field">
        <span>Best con</span>
        <select [value]="bestPlayersFilter()" (change)="updateBestPlayersFilter($event)">
          <option value="">Tutti</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
        </select>
      </label>

      <label class="filter-field">
        <span>Durata max</span>
        <select [value]="durationFilter()" (change)="updateDurationFilter($event)">
          <option value="">Qualsiasi</option>
          <option value="20">20 min</option>
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min</option>
          <option value="90">90 min</option>
        </select>
      </label>

      <label class="filter-field">
        <span>Difficolta max</span>
        <select [value]="complexityFilter()" (change)="updateComplexityFilter($event)">
          <option value="">Qualsiasi</option>
          <option value="1.5">1.5</option>
          <option value="2">2.0</option>
          <option value="2.5">2.5</option>
          <option value="3">3.0</option>
          <option value="4">4.0</option>
        </select>
      </label>
    </div>
  </section>

  <section class="catalog-band">
    <div class="games-grid">
      @for (game of filteredGames(); track game.slug) {
        <a
          class="game-card"
          [routerLink]="['/games', game.slug]"
          [style.--card-accent]="game.accentColor"
          [attr.aria-label]="getGameLabel(game.title)"
          [attr.title]="game.title"
        >
          <img class="game-cover" [src]="game.coverUrl" [alt]="'Cover di ' + game.title" />

          <div class="game-meta">
            <h2 class="game-title">{{ game.title }}</h2>
            <div class="game-facts" aria-label="Dettagli rapidi del gioco">
              <span class="fact-chip fact-chip--time" [attr.aria-label]="'Durata ' + game.playTime">
                <span class="fact-chip__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path
                      d="M12 6.25a.75.75 0 0 1 .75.75v4.69l3 1.73a.75.75 0 0 1-.75 1.3l-3.38-1.95A.75.75 0 0 1 11.25 12V7a.75.75 0 0 1 .75-.75Z"
                    />
                    <path
                      d="M12 2.75a9.25 9.25 0 1 0 9.25 9.25A9.26 9.26 0 0 0 12 2.75Zm0 17a7.75 7.75 0 1 1 7.75-7.75A7.76 7.76 0 0 1 12 19.75Z"
                    />
                  </svg>
                </span>
                <span class="fact-chip__value">{{ game.playTime }}</span>
              </span>

              <span
                class="fact-chip fact-chip--players"
                [attr.aria-label]="'Giocatori ' + getPlayersSummary(game)"
              >
                <span class="fact-chip__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path
                      d="M16.75 13.5a3.25 3.25 0 1 0-2.76-5h-.48a3.25 3.25 0 1 0-5.02 3.99A4.75 4.75 0 0 0 5 17v.25c0 .41.34.75.75.75h12.5c.41 0 .75-.34.75-.75V17a4.73 4.73 0 0 0-2.25-4.05Zm-8-4a1.75 1.75 0 1 1 1.75 1.75A1.75 1.75 0 0 1 8.75 9.5Zm8 0A1.75 1.75 0 1 1 15 7.75a1.75 1.75 0 0 1 1.75 1.75ZM6.56 16.5a3.26 3.26 0 0 1 3.19-2.5h4.5a3.26 3.26 0 0 1 3.19 2.5Z"
                    />
                  </svg>
                </span>
                <span class="fact-chip__value">{{ getPlayersSummary(game) }}</span>
              </span>

              <span class="fact-chip fact-chip--best" [attr.aria-label]="'Best con ' + game.bestPlayers">
                <span class="fact-chip__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path
                      d="m12 3.75 2.25 4.56 5.03.73-3.64 3.54.86 5.01L12 15.23l-4.5 2.36.86-5.01-3.64-3.54 5.03-.73L12 3.75Zm0 2.7-1.38 2.79a.75.75 0 0 1-.56.41l-3.08.45 2.23 2.17a.75.75 0 0 1 .22.66l-.53 3.07 2.75-1.45a.75.75 0 0 1 .7 0L15.1 16l-.53-3.07a.75.75 0 0 1 .22-.66l2.23-2.17-3.08-.45a.75.75 0 0 1-.56-.41L12 6.45Z"
                    />
                  </svg>
                </span>
                <span class="fact-chip__value">{{ game.bestPlayers }}</span>
              </span>

              <span
                class="fact-chip fact-chip--difficulty"
                [attr.aria-label]="'Difficolta ' + getDifficultySummary(game)"
              >
                <span class="fact-chip__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path
                      d="M10.02 4.43a2.25 2.25 0 1 1 3.96 2.14l-.54.99a4.26 4.26 0 0 1 1.74 1.75l.99-.54a2.25 2.25 0 1 1 2.14 3.96l-.99.54c.12.5.18 1.01.18 1.52s-.06 1.02-.18 1.52l.99.54a2.25 2.25 0 1 1-2.14 3.96l-.99-.54a4.26 4.26 0 0 1-1.75 1.74l.54.99a2.25 2.25 0 1 1-3.96 2.14l-.54-.99a4.26 4.26 0 0 1-1.52.18c-.51 0-1.02-.06-1.52-.18l-.54.99a2.25 2.25 0 1 1-3.96-2.14l.54-.99a4.26 4.26 0 0 1-1.74-1.75l-.99.54a2.25 2.25 0 1 1-2.14-3.96l.99-.54A6.9 6.9 0 0 1 3.75 12c0-.51.06-1.02.18-1.52l-.99-.54a2.25 2.25 0 1 1 2.14-3.96l.99.54A4.26 4.26 0 0 1 7.81 5.8l-.54-.99a2.25 2.25 0 1 1 2.75-.38Zm1.98 4.82a2.75 2.75 0 1 0 0 5.5 2.75 2.75 0 0 0 0-5.5Z"
                    />
                  </svg>
                </span>
                <span class="fact-chip__value">{{ getDifficultySummary(game) }}</span>
              </span>
            </div>
          </div>
        </a>
      }
    </div>

    @if (filteredGames().length === 0) {
      <p class="empty-state">Nessun gioco corrisponde ai filtri attivi.</p>
    }
  </section>
</main>
